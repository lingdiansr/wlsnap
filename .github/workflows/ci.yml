name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Format check — must pass before anything else
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # ---------------------------------------------------------------------------
  # 2. Clippy — zero warnings tolerated
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev wayland-scanner libxkbcommon-dev pkg-config

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # 3. Build check — ensure everything compiles
  # ---------------------------------------------------------------------------
  check:
    name: Check
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev wayland-scanner libxkbcommon-dev pkg-config

      - name: Check debug build
        run: cargo check --all-targets --all-features

      - name: Check release build
        run: cargo check --release --all-targets --all-features

  # ---------------------------------------------------------------------------
  # 4. Test — run full test suite (headless-friendly tests only)
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [clippy, check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev wayland-scanner libxkbcommon-dev pkg-config

      - name: Run tests
        run: cargo test --all-targets --all-features
        env:
          # Explicitly unset to ensure tests don't accidentally pick up a display
          WAYLAND_DISPLAY: ""

  # ---------------------------------------------------------------------------
  # 5. Security audit — cargo-audit for CVE scanning
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # 6. Dependency check — cargo-deny for licenses & duplicates
  # ---------------------------------------------------------------------------
  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo deny
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # 7. Code coverage — tarpaulin with threshold check + artifact upload
  # ---------------------------------------------------------------------------
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev wayland-scanner libxkbcommon-dev pkg-config

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --all-targets --all-features --out html --out stdout --timeout 300
        env:
          WAYLAND_DISPLAY: ""

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage from tarpaulin stdout
          COVERAGE=$(cargo tarpaulin --all-targets --all-features --out stdout --timeout 300 2>&1 | grep -oP '\d+\.\d+% coverage' | head -1 | grep -oP '\d+\.\d+' || echo "0")
          echo "Coverage: $COVERAGE%"
          THRESHOLD=50.0
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi
          echo "Coverage threshold passed"
        env:
          WAYLAND_DISPLAY: ""

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tarpaulin-report.html
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 8. Documentation — build rustdoc and deploy to GitHub Pages
  # ---------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev wayland-scanner libxkbcommon-dev pkg-config

      - name: Build documentation
        run: cargo doc --no-deps --all-features

      - name: Add redirect index
        run: echo '<meta http-equiv="refresh" content="0;url=wlsnap/index.html">' > target/doc/index.html

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  # ---------------------------------------------------------------------------
  # 9. Wayland integration test — run ignored tests with headless compositor
  # ---------------------------------------------------------------------------
  test-wayland:
    name: Wayland Integration Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev wayland-scanner libxkbcommon-dev pkg-config weston

      - name: Start headless Weston compositor
        run: |
          mkdir -p /tmp/weston
          weston --backend=headless.so --socket=wayland-ci --idle-time=0 &
          sleep 2
          echo "WAYLAND_DISPLAY=wayland-ci" >> "$GITHUB_ENV"

      - name: Run ignored Wayland tests
        run: cargo test --all-targets --all-features -- --ignored
        env:
          WAYLAND_DISPLAY: wayland-ci

      - name: Stop Weston
        if: always()
        run: pkill weston || true
